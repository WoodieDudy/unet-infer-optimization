exp_dir: "experiments/train_sparse"
lr: 0.00001
trainer:
  max_epochs: 3
  accelerator: "gpu"
  devices: 1
  precision: "16-mixed"
  log_every_n_steps: 10

model_checkpoint:
  filename: "trained_sparse"
  save_top_k: 1
  monitor: "val_iou"
  mode: "max"

model:
  classes: 3
  in_channels: 3
  encoder_weights: null
  encoder_name: "resnet34"

data:
  batch_size: 32
  input_size: 256
  num_workers: 4
