exp_dir: "experiments/train_local"
lr: 0.0001
trainer:
  max_epochs: 10
  accelerator: "gpu"
  devices: 1
  precision: "16-mixed"
  log_every_n_steps: 10

model_checkpoint:
  filename: "trained_baseline"
  save_top_k: 1
  monitor: "val_iou"
  mode: "max"

model:
  classes: 3
  in_channels: 3
  encoder_weights: "imagenet"
  encoder_name: "resnet34"

data:
  batch_size: 32
  input_size: 256
  num_workers: 4

bench:
  warmup: 20
  min_run_time: 3
